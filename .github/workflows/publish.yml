name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - query-builder
          - esql-dsl
          - search-dsl
          - all
      tag:
        description: 'npm dist-tag (e.g. alpha, beta, latest)'
        required: true
        default: 'alpha'
      branch:
        description: 'Branch to publish from'
        required: true
        default: 'main'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@elastic'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Publish query-builder
        if: ${{ github.event.inputs.package == 'query-builder' || github.event.inputs.package == 'all' }}
        run: pnpm publish --access public --no-git-checks --tag ${{ github.event.inputs.tag }}
        working-directory: packages/query-builder
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish esql-dsl
        if: ${{ github.event.inputs.package == 'esql-dsl' || github.event.inputs.package == 'all' }}
        run: pnpm publish --access public --no-git-checks --tag ${{ github.event.inputs.tag }}
        working-directory: packages/esql-dsl
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish search-dsl
        if: ${{ github.event.inputs.package == 'search-dsl' || github.event.inputs.package == 'all' }}
        run: pnpm publish --access public --no-git-checks --tag ${{ github.event.inputs.tag }}
        working-directory: packages/search-dsl
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
