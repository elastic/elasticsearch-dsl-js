name: docs-build
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group: ~
permissions:
  contents: read
  pull-requests: read
jobs:
  build:
    uses: elastic/docs-actions/.github/workflows/docs-build.yml@08a1e1a51c249fb0ee22730705ffaba1d6d3a7ef # v1
    with:
      enable-vale-linting: true
