name: docs-build
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group: ~
permissions:
  contents: read
  pull-requests: read
jobs:
  build:
    uses: elastic/docs-actions/.github/workflows/docs-build.yml@7faef2a2633c8ed5b0be2906851e2bbdc28f6cdf # v1
    with:
      enable-vale-linting: true
